apiVersion: apps/v1
kind: Deployment
metadata:
  name: drinkool-frontend
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: frontend-container
        image: git.demonkernel.io.vn/foodsurf/frontend:1.1.2
        ports:
          - containerPort: 3000
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "50m" 
            memory: "128Mi"
        env:
          - name: NODE_ENV
            value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: drinkool-frontend-svc
spec:
  type: NodePort 
  selector:
    app: web 
  ports:
    - protocol: TCP
      port: 80      
      targetPort: 3000 
      nodePort: 30080 